<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>로그인</title>
</head>
<body>
    {% if request.GET.required == "1" %}
        <script>
            alert("로그인 후 이용해주세요.");
        </script>
    {% endif %}

    <h1>로그인</h1>

    {% if form.errors %}
        <p>아이디 또는 비밀번호를 확인해주세요.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <p>
            <label for="{{ form.username.id_for_label }}">아이디</label><br>
            {{ form.username }}
        </p>

        <p>
            <label for="{{ form.password.id_for_label }}">비밀번호</label><br>
            {{ form.password }}
        </p>

        <button type="submit">로그인</button>
    </form>
</body>
</html>
