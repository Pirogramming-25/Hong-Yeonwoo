<!DOCTYPE html>
<html>
<head>
    <title>{% if review %}수정{% else %}리뷰 작성{% endif %}</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 50px auto; }
        input, textarea { width: 100%; padding: 10px; font-size: 14px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: sans-serif; }
        textarea { height: 200px; resize: vertical; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        .btn { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 14px; }
        .btn-save { background: #599fc7; }
        .btn-back { background: #666; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <h1>{% if review %}리뷰 수정{% else %}리뷰 작성{% endif %}</h1>

    <form method="POST">
        {% csrf_token %}

        <label>영화 제목</label>
        <input type="text" name="title" value="{{ review.title|default:'' }}" required>

        <label>감독</label>
        <input type="text" name="director" value="{{ review.director|default:'' }}" required>

        <label>주연</label>
        <input type="text" name="actor" value="{{ review.actor|default:'' }}" required>

        <label>장르</label>
        <input type="text" name="genre" value="{{ review.genre|default:'' }}" required>

        <label>별점</label>
        <input type="number" step="0.5" name="rating" value="{{ review.rating|default:'' }}" required>

        <label>러닝타임</label>
        <input type="number" name="running_time" value="{{ review.running_time|default:'' }}" required>

        <label>개봉년도</label>
        <input type="number" name="release_year" value="{{ review.release_year|default:'' }}" required>

        <label>리뷰 내용</label>
        <textarea name="content" required>{{ review.content|default:'' }}</textarea>

        <br><br>
        <button type="submit" class="btn btn-save">저장</button>
        <a href="{% url 'review-list' %}" class="btn btn-back">취소</a>
    </form>
</body>
</html>
